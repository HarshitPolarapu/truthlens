<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruthLens</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9f9f9;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
    }

    .container { width: 100%; max-width: 560px; }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    select {
      flex: 1;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      color: #111;
      outline: none;
      cursor: pointer;
    }

    select:focus { border-color: #aaa; }

    textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      color: #111;
      resize: vertical;
      min-height: 120px;
      outline: none;
      line-height: 1.6;
    }

    textarea:focus { border-color: #aaa; }

    .char { font-size: 12px; color: #bbb; text-align: right; margin-top: 4px; margin-bottom: 16px; }

    button#analyze {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      background: #111;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button#analyze:hover { background: #333; }
    button#analyze:disabled { background: #ccc; cursor: not-allowed; }

    .status {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-top: 16px;
      min-height: 20px;
    }

    .result {
      margin-top: 28px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      background: white;
      overflow: hidden;
      display: none;
    }

    .result.visible { display: block; }

    .result-top {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid #f0f0f0;
    }

    .verdict { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .summary { font-size: 13px; color: #555; line-height: 1.6; max-width: 360px; }

    .score {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      text-align: right;
    }

    .score-label { font-size: 11px; color: #aaa; text-align: right; margin-top: 2px; }

    .flags {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .flag-col { padding: 16px 20px; }
    .flag-col:first-child { border-right: 1px solid #f0f0f0; }

    .flag-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .flag-title.red { color: #c0392b; }
    .flag-title.green { color: #27ae60; }

    .flag-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    .flag-list li {
      font-size: 13px;
      color: #444;
      line-height: 1.4;
      padding-left: 12px;
      position: relative;
    }

    .flag-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: #bbb;
    }

    .flag-list .empty { color: #bbb; font-style: italic; }

    .sources-note {
      padding: 14px 20px;
      font-size: 12px;
      color: #888;
      line-height: 1.6;
      border-top: 1px solid #f0f0f0;
    }

    .reset {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      font-size: 13px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
    }

    .reset:hover { border-color: #aaa; color: #555; }

    .error {
      margin-top: 12px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      font-size: 13px;
      color: #b91c1c;
      display: none;
    }

    .error.visible { display: block; }

    @media (max-width: 480px) {
      .flags { grid-template-columns: 1fr; }
      .flag-col:first-child { border-right: none; border-bottom: 1px solid #f0f0f0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TruthLens</h1>
    <p class="subtitle">Paste a headline or article. Get an AI fact-check.</p>

    <label>Region & political lens</label>
    <div class="row">
      <select id="region">
        <option value="India">India</option>
        <option value="USA">USA</option>
        <option value="European Union">European Union</option>
        <option value="Global">Global</option>
      </select>
      <select id="leaning">
        <option value="Far Left">Far Left</option>
        <option value="Left">Left</option>
        <option value="Centre" selected>Centre</option>
        <option value="Right">Right</option>
        <option value="Far Right">Far Right</option>
      </select>
    </div>

    <label>Article or headline</label>
    <textarea id="text" placeholder="Paste text here..." maxlength="3000"></textarea>
    <div class="char"><span id="count">0</span> / 3000</div>

    <button id="analyze">Analyze</button>
    <div class="error" id="error"></div>
    <div class="status" id="status"></div>

    <div class="result" id="result">
      <div class="result-top">
        <div>
          <div class="verdict" id="verdict"></div>
          <div class="summary" id="summary"></div>
        </div>
        <div>
          <div class="score" id="score"></div>
          <div class="score-label">/ 10</div>
        </div>
      </div>
      <div class="flags">
        <div class="flag-col">
          <div class="flag-title red">Red flags</div>
          <ul class="flag-list" id="red-flags"></ul>
        </div>
        <div class="flag-col">
          <div class="flag-title green">Green flags</div>
          <ul class="flag-list" id="green-flags"></ul>
        </div>
      </div>
      <div class="sources-note" id="sources-note"></div>
    </div>

    <button class="reset" id="reset" style="display:none">Analyze another</button>
  </div>

  <script>
    const WORKER_URL = "truthlens.harshitpolarapu.workers.dev";

    const sourceMap = {
      India: {
        "Far Left": "Newsclick, The Caravan, Scroll (left-leaning), Wire",
        "Left": "The Wire, Scroll.in, The Quint, NDTV",
        "Centre": "The Hindu, NDTV, Hindustan Times, Reuters India, PTI",
        "Right": "Times of India, Indian Express, ANI, Economic Times",
        "Far Right": "OpIndia, Republic World, Swarajya, Organiser"
      },
      USA: {
        "Far Left": "Jacobin, Democracy Now, The Intercept, Common Dreams",
        "Left": "The Guardian US, MSNBC, Vox, Mother Jones, HuffPost",
        "Centre": "Reuters, AP News, NPR, PBS NewsHour, The Hill",
        "Right": "Fox News, New York Post, Washington Examiner",
        "Far Right": "Breitbart, Daily Wire, Gateway Pundit"
      },
      "European Union": {
        "Far Left": "transform! europe, Le Monde Diplomatique",
        "Left": "EUobserver, Social Europe, Euractiv (left)",
        "Centre": "Euractiv, Politico Europe, Deutsche Welle, BBC Europe",
        "Right": "Politico Europe (right), European Conservative",
        "Far Right": "Voice of Europe, Remix News, Visegrád Post"
      },
      Global: {
        "Far Left": "Al Jazeera opinion, Jacobin, Democracy Now",
        "Left": "The Guardian, Al Jazeera, BBC (editorial), Vox",
        "Centre": "Reuters, AP News, BBC News, AFP",
        "Right": "Fox News, Daily Telegraph, Washington Times",
        "Far Right": "Breitbart, Gateway Pundit, Epoch Times"
      }
    };

    const textarea = document.getElementById("text");
    textarea.addEventListener("input", () => {
      document.getElementById("count").textContent = textarea.value.length;
    });

    document.getElementById("analyze").addEventListener("click", async () => {
      const text = textarea.value.trim();
      const region = document.getElementById("region").value;
      const leaning = document.getElementById("leaning").value;
      const sources = sourceMap[region]?.[leaning] || "mainstream outlets";

      if (!text) { showError("Please paste some text first."); return; }

      hideError();
      setStatus("Analyzing...");
      document.getElementById("analyze").disabled = true;
      document.getElementById("result").classList.remove("visible");
      document.getElementById("reset").style.display = "none";

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, region, leaning, sources })
        });

        if (!res.ok) throw new Error("Worker returned an error.");
        const data = await res.json();
        showResult(data);
      } catch (err) {
        showError("Something went wrong. Try again.");
      } finally {
        setStatus("");
        document.getElementById("analyze").disabled = false;
      }
    });

    function showResult(r) {
      const score = r.score;
      const color = score >= 7 ? "#27ae60" : score >= 4 ? "#e67e22" : "#c0392b";

      document.getElementById("verdict").textContent = r.verdict;
      document.getElementById("verdict").style.color = color;
      document.getElementById("summary").textContent = r.summary;
      document.getElementById("score").textContent = score;
      document.getElementById("score").style.color = color;

      const redList = document.getElementById("red-flags");
      redList.innerHTML = "";
      (r.red_flags?.length ? r.red_flags : []).forEach(f => {
        const li = document.createElement("li"); li.textContent = f; redList.appendChild(li);
      });
      if (!r.red_flags?.length) redList.innerHTML = '<li class="empty">None detected</li>';

      const greenList = document.getElementById("green-flags");
      greenList.innerHTML = "";
      (r.green_flags?.length ? r.green_flags : []).forEach(f => {
        const li = document.createElement("li"); li.textContent = f; greenList.appendChild(li);
      });
      if (!r.green_flags?.length) greenList.innerHTML = '<li class="empty">None detected</li>';

      document.getElementById("sources-note").textContent = r.sources_note || "";
      document.getElementById("result").classList.add("visible");
      document.getElementById("reset").style.display = "block";
    }

    document.getElementById("reset").addEventListener("click", () => {
      document.getElementById("result").classList.remove("visible");
      document.getElementById("reset").style.display = "none";
      textarea.value = "";
      document.getElementById("count").textContent = "0";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.classList.add("visible");
    }

    function hideError() {
      document.getElementById("error").classList.remove("visible");
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }
  </script>
</body>
</html>
